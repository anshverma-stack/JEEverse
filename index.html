<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Word Saver</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 30px;
      max-width: 500px;
      margin: auto;
    }

    input, button {
      padding: 8px;
      margin: 5px;
    }

    .card {
      background: #222;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>🔥 Word Saver</h1>

<button onclick="login()">Login with Google</button>

<br><br>

<input id="wordInput" placeholder="Enter word">
<button onclick="addWord()">Save</button>

<h2>Saved Words</h2>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDMG2GapxBu9Tnry0fJx7IaQO1zwgA0sVw",
  authDomain: "jee-progress-tracker-3d733.firebaseapp.com",
  projectId: "jee-progress-tracker-3d733",
  storageBucket: "jee-progress-tracker-3d733.firebasestorage.app",
  messagingSenderId: "644810316053",
  appId: "1:644810316053:web:aa531fc435469e3e2c311c",
  measurementId: "G-KV8VY2VBST"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let data = [];

// LOGIN
window.login = async function () {
  const provider = new GoogleAuthProvider();
  const result = await signInWithPopup(auth, provider);
  currentUser = result.user;
};

// AUTO LOAD DATA
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;

    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);

    if (snap.exists()) {
      data = snap.data().words || [];
      render();
    }
  }
});

// SAVE DATA
async function saveData() {
  if (!currentUser) return alert("Login first!");

  await setDoc(doc(db, "users", currentUser.uid), {
    words: data
  });
}

// ADD WORD
window.addWord = function () {
  const input = document.getElementById("wordInput");
  const word = input.value.trim();

  if (!word) return alert("Enter a word!");

  data.push(word);
  saveData();
  render();

  input.value = "";
};

// DELETE WORD
window.deleteWord = function (index) {
  data.splice(index, 1);
  saveData();
  render();
};

// RENDER
function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach((word, index) => {
    list.innerHTML += `
      <div class="card">
        ${word}<br>
        <button onclick="deleteWord(${index})">Delete</button>
      </div>
    `;
  });
}
</script>

</body>
</html>
